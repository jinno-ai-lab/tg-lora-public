name: Tests

on:
  push:
    branches: [main, develop, "feature/**", "ai/**"]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        env:
          CI: "1"
        run: |
          pytest tests/ -x -q --tb=short \
            --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml \
            --cov-fail-under=95 \
            -m "not slow"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml

  # GPU-free CI gates that must run on every push/PR. These are the make targets
  # that previously existed only as local `make` entries with no CI invocation
  # (i.e. inert) — wiring them here is the in-repo realization of the AI-Hub
  # feedback "confirm the GPU-free gates are wired into the gate sequence, else
  # they are inert". The break-even gate used to stay out (it needed a
  # paper-summary input CI cannot produce without a GPU A/B); it is now wired in
  # via a producer-faithful checked-in fixture (see step below). Only the
  # genuinely GPU-needing freeze-validloss-ci stays out of this job.
  gates:
    name: GPU-free CI gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Portable velocity-ops gate (REQ-149). Hardware-normalized cap_update
      # overhead ratio — does NOT depend on the runner's absolute speed, so it
      # cannot flap across github-hosted runners the way the old absolute-time
      # --baseline comparison did. Invokes the script directly (not `make`) so it
      # does not depend on a checked-in .venv existing.
      - name: Portable velocity-ops gate
        run: python scripts/benchmark_velocity_ops.py --quick --max-cap-overhead-ratio 3.0

      # Prefix-cache break-even gate. NON-INERT in CI: invoked on every push
      # against the producer-faithful checked-in fixture (generated by the real
      # build_benchmark_summary over canonical inputs). Self-tests ALL FOUR
      # decision gates so a regression in any one fails CI:
      #   accept  — exit 0 on the budget-compliant canonical fixture
      #   reject1 — non-zero on a VRAM-violating mutation (warm TG 14000 > 12288),
      #             naming only the offending TG arm (baseline stays under budget)
      #   reject2 — non-zero on --max-break-even-runs (canonical ber=10 > 5):
      #             the cold build does not amortize within the run budget
      #   reject3 — non-zero on --require-one-run-win (canonical one-run
      #             delta=-540 <= 0): a single run incl. the cold build loses
      # Before this, CI self-tested only the wall-clock + VRAM gates; the two
      # amortization gates (the ones that answer "does the cold build pay off")
      # were exercised only by the pytest e2e class via the make-target path.
      # Invokes the script directly (not `make`) so it doesn't depend on a
      # checked-in .venv — same portability rule as the velocity-ops step. The
      # `make gates-ci` aggregate and the pytest e2e class exercise the same
      # logic via the make-target path.
      - name: Prefix-cache break-even gate
        run: |
          set -euo pipefail
          FIX=tests/fixtures/prefix_break_even_canonical_summary.json
          # Accept boundary: the canonical fixture satisfies both gates (exit 0).
          python scripts/analyze_prefix_cache_break_even.py \
            --paper-summary "$FIX" \
            --require-warm-win --max-warm-gpu-peak-mb 12288 \
            --output runs/gates_ci/break_even_verdict.json
          # Reject boundary: a VRAM-violating mutation must exit non-zero and
          # name only the TG arm (the baseline arm is under budget). The verdict
          # is read via the STRUCTURED `arm` field (the metric key), not by
          # substring-matching the human-readable message — so per-arm
          # attribution survives any future message rewording.
          python -c "import json,pathlib; d=json.loads(pathlib.Path('$FIX').read_text()); d['warm']['tg_lora']['gpu_peak_mb']=14000.0; pathlib.Path('runs/gates_ci/break_even_violating.json').write_text(json.dumps(d))"
          set +e
          python scripts/analyze_prefix_cache_break_even.py \
            --paper-summary runs/gates_ci/break_even_violating.json \
            --require-warm-win --max-warm-gpu-peak-mb 12288 \
            --output runs/gates_ci/break_even_violating_verdict.json
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "ERROR: break-even gate must exit non-zero on a VRAM-violating summary, got exit 0" >&2
            exit 1
          fi
          python -c "import json; d=json.load(open('runs/gates_ci/break_even_violating_verdict.json')); arms={f.get('arm') for f in d['gates']['failures']}; assert d['gates']['passed'] is False and arms=={'warm_tg_gpu_peak_mb'}, 'reject verdict malformed, arms='+str(arms); print('reject verdict gate/arm:', d['gates']['failures'][0]['gate'], d['gates']['failures'][0]['arm'])"
          # Reject boundary #2 — --max-break-even-runs: the canonical fixture has
          # break_even_repeated_runs = cold_build(600)/warm_delta(60) = 10.0, so a
          # run budget of 5 must fire naming ONLY the amortization gate (warm-win
          # passes 240<300, so it cannot mask the amortization failure).
          set +e
          python scripts/analyze_prefix_cache_break_even.py \
            --paper-summary "$FIX" \
            --require-warm-win --max-break-even-runs 5 \
            --output runs/gates_ci/break_even_ber_violating_verdict.json
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "ERROR: --max-break-even-runs must exit non-zero on the canonical fixture (ber=10 > 5), got exit 0" >&2
            exit 1
          fi
          python -c "import json; d=json.load(open('runs/gates_ci/break_even_ber_violating_verdict.json')); assert d['gates']['passed'] is False and [f['gate'] for f in d['gates']['failures']]==['--max-break-even-runs'], 'ber reject verdict malformed'; print('ber reject verdict gate:', d['gates']['failures'][0]['gate'])"
          # Reject boundary #3 — --require-one-run-win: a single run INCLUDING the
          # cold build (600+240=840) does not beat the baseline (300), so
          # one_run_total_delta=-540 <= 0 and the gate must fire naming only itself.
          set +e
          python scripts/analyze_prefix_cache_break_even.py \
            --paper-summary "$FIX" \
            --require-one-run-win \
            --output runs/gates_ci/break_even_onerun_violating_verdict.json
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "ERROR: --require-one-run-win must exit non-zero on the canonical fixture (one-run delta=-540 <= 0), got exit 0" >&2
            exit 1
          fi
          python -c "import json; d=json.load(open('runs/gates_ci/break_even_onerun_violating_verdict.json')); assert d['gates']['passed'] is False and [f['gate'] for f in d['gates']['failures']]==['--require-one-run-win'], 'one-run-win reject verdict malformed'; print('one-run-win reject verdict gate:', d['gates']['failures'][0]['gate'])"
          echo "Prefix-cache break-even gate: accept (exit 0) + 3 reject boundaries (VRAM / break-even-runs / one-run-win) all verified."
