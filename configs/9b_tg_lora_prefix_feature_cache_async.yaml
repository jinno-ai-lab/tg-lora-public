experiment:
  name: qwen35_9b_tg_lora_prefix_feature_cache_async
  seed: 42

model:
  name_or_path: Qwen/Qwen3.5-9B
  dtype: bfloat16
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16

lora:
  r: 16
  alpha: 32
  dropout: 0.0
  target_modules: all-linear

data:
  train_path: data/train.jsonl
  valid_quick_path: data/valid_quick.jsonl
  valid_full_path: data/valid_full.jsonl
  gold_test_path: data/gold_test.jsonl
  max_seq_len: 2048

training:
  batch_size: 1
  grad_accumulation: 8
  learning_rate: 2.0e-4
  weight_decay: 0.0
  max_cycles: 100
  gradient_checkpointing: true
  max_grad_norm: 1.0
  optimizer_lifecycle: recreate_per_cycle
  trainable_lora_scope: last_25_percent
  prefix_feature_cache_experimental: true
  prefix_feature_cache_train: false
  prefix_feature_cache_valid_quick: true
  prefix_feature_cache_valid_full: true
  prefix_feature_cache_num_workers: 4
  prefix_feature_cache_pin_memory: true
  prefix_feature_cache_persistent_workers: true
  prefix_feature_cache_prefetch_factor: 4
  prefix_feature_cache_dir: .cache/prefix_feature_cache
  prefix_feature_cache_force_rebuild: false
  prefix_feature_cache_async: true
  prefix_feature_cache_async_device: "cuda:1"

tg_lora:
  K_initial: 2
  K_candidates: [1, 2, 3]
  N_initial: 1
  N_candidates: [1, 2, 4]
  alpha_initial: 0.3
  alpha_min: 0.05
  alpha_max: 1.0
  alpha_log_sigma: 0.1
  beta_initial: 0.9
  beta_candidates: [0.8, 0.9, 0.95]
  relative_update_cap: 0.5
  active_layer_strategy: last_25_percent
  random_middle_layers: 0
  layer_sample_temperature: 1.0
  force_top_layers_only: true
  enable_random_walk: true
  enable_convergence_adaptation: true
  lr_explore_prob: 0.3
  lr_log_sigma: 0.1
  lr_initial: 2.0e-4
  lr_min: 1.0e-5
  lr_max: 5.0e-4

eval:
  quick_eval_examples: 32
  full_eval_every_cycles: 10
  rollback_tolerance: 0.005
  moving_avg_window: 3
  soft_accept_temperature: 0.0

logging:
  backend: mlflow
  log_every_cycles: 1
  save_every_cycles: 25
  run_dir: runs/qwen35_9b_tg_lora_prefix_feature_cache_async
