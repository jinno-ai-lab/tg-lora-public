# MLX QLoRA baseline for Qwen3.6-35B-A3B (MoE, 35B total / 3.3B active)
model: .cache/mlx_models/Qwen3.6-35B-A3B-4bit
data: data_mlx
train: true
iters: 500
batch_size: 1
grad_accumulation_steps: 8
max_seq_length: 2048
seed: 42
grad_checkpoint: true
optimizer: adamw
learning_rate: 5.0e-5
lr_schedule:
  name: cosine_decay
  arguments:
    - 5.0e-5
    - 500
  warmup: 20
  warmup_init: 0.0
optimizer_config:
  adamw:
    weight_decay: 0.01
max_grad_norm: 1.0
clear_cache_threshold: 8589934592
wired_limit_ratio: 0.8
memory_limit_ratio: 0.8
cache_limit_ratio: 0.15
steps_per_report: 10
steps_per_eval: 50
save_every: 50
adapter_path: runs/mlx_qlora_35b_baseline
