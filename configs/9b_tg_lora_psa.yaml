experiment:
  name: tg_lora_9b_psa
  seed: 42

model:
  name_or_path: Qwen/Qwen3.5-9B
  dtype: bfloat16
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16

lora:
  r: 16
  alpha: 32
  dropout: 0.0
  target_modules: all-linear

data:
  train_path: data/train.jsonl
  valid_quick_path: data/valid_quick.jsonl
  valid_full_path: data/valid_full.jsonl
  gold_test_path: data/gold_test.jsonl
  max_seq_len: 1024

training:
  batch_size: 1
  grad_accumulation: 8
  learning_rate: 2.0e-4
  weight_decay: 0.0
  max_cycles: 120
  gradient_checkpointing: true
  max_grad_norm: 1.0
  optimizer_lifecycle: recreate_per_cycle
  schedule_type: linear
  early_stopping_patience: null
  min_cycles_before_stop: 3
  min_steps_before_stop: 100
  save_trajectory_delta_artifacts: true
  trainable_lora_scope: last_25_percent
  prefix_feature_cache_experimental: true
  prefix_feature_cache_train: true
  prefix_feature_cache_valid_quick: true
  prefix_feature_cache_valid_full: true
  prefix_feature_cache_num_workers: 4
  prefix_feature_cache_pin_memory: true
  prefix_feature_cache_persistent_workers: true
  prefix_feature_cache_prefetch_factor: 4
  prefix_feature_cache_dir: .cache/prefix_feature_cache_psa_ablation
  prefix_feature_cache_force_rebuild: false
  prefix_feature_cache_mode: reuse
  prefix_feature_cache_share_across_seeds: true
  prefix_feature_cache_offload_prefix_to_cpu: true
  prefix_feature_cache_async: false
  prefix_feature_cache_async_device: null

tg_lora:
  K_initial: 3
  K_candidates: [2, 3, 5, 8]

  N_initial: 5
  N_candidates: [1, 3, 5, 10, 20]

  alpha_initial: 0.3
  alpha_min: 0.03
  alpha_max: 1.5
  alpha_log_sigma: 0.15

  beta_initial: 0.8
  beta_candidates: [0.5, 0.8, 0.9, 0.95]

  lr_initial: 0.0005
  lr_min: 1.0e-5
  lr_max: 0.001
  lr_accept_boost: 1.05
  lr_reject_decay: 0.5

  k_explore_prob: 0.0
  n_explore_prob: 0.0
  beta_explore_prob: 0.0
  strategy_explore_prob: 0.0
  lr_explore_prob: 0.0
  lr_log_sigma: 0.1

  relative_update_cap: 0.005

  active_layer_strategy: last_25_percent
  random_middle_layers: 2
  layer_sample_temperature: 1.0
  force_top_layers_only: true
  enable_random_walk: false
  enable_convergence_adaptation: false

  confident_skip_cos: 0.0
  confident_skip_min_cycles: 10

  cosine_n_selection_enabled: true
  cosine_n_selection_short_window: 2
  cosine_n_selection_long_window: 4
  cosine_n_selection_thresholds:
    1: 0.20

  subspace_zo_enabled: false
  subspace_zo_tau_dim: 0.15
  subspace_zo_tau_cos: 0.70
  subspace_zo_mu_ratio: 0.001
  subspace_zo_eps_curv: 1.0e-8
  subspace_zo_eta_fallback_ratio: 0.01
  subspace_zo_max_step_ratio: 0.02
  subspace_zo_max_steps_per_cycle: 10
  subspace_zo_force_dim: 0
  subspace_zo_disable_curvature: false
  subspace_zo_stop_on_positive_g1: true
  subspace_zo_g1_stop_epsilon: 0.0

  # M9 disabled — mutually exclusive with PSA
  subspace_m9_enabled: false
  subspace_m9_fd_eps: 0.001
  subspace_m9_lr: 0.5
  subspace_m9_steps: 1

  # PSA (Prior-based Subspace Amplification)
  enable_psa: true
  psa_history_length: 6
  psa_gain: 0.5
  psa_update_interval: 3
  psa_warmup_steps: 4
  psa_l2_reg: 0.01
  psa_regime_reset_enabled: true
  psa_regime_window: 8
  psa_regime_plateau_eps: 1.0e-4
  psa_regime_transition_z: 2.0
  psa_regime_plateau_gain: 0.5

  # LAWA weight averaging baseline (GOAL §3.3 mandatory baseline)
  enable_lawa: false
  lawa_window_size: 5
  lawa_start_cycle: 10

  # Activation-fingerprint regime inventory (GOAL §4 step 1)
  activation_regime_enabled: true
  activation_regime_window: 10
  activation_regime_stable_threshold: 0.95
  activation_regime_chaotic_threshold: 0.5
  activation_regime_transition_drop_z: 2.0
  activation_regime_min_history: 3

  shadow_extrapolation_enabled: false

  accept_after_sgd_steps: 0
  accept_after_sgd_lr: null

  warmup_release_cos: 0.1
  warmup_release_count: 1

  # Linearity Guard config
  linearity_guard_enabled: false
  linearity_guard_min_acceptance_rate: 0.0
  linearity_guard_warmup_cycles: 5
  linearity_guard_max_positive_acceleration: 0.02
  linearity_guard_pilot_margin: 0.01

alpha_line:
  alpha_line_enabled: false
  alpha_line_order: 0
  b_logical: 32
  b_heavy: 4
  b_light: 16
  m_alpha_steps: 19
  alpha_init: 0.0
  alpha_lr: 0.01
  v_update_every: 1
  alpha_line_max_consecutive_reject: 3
  alpha_line_finite_diff_eps: 0.001
  future_work_metrics_enabled: false
  future_work_internal_metrics_enabled: false

eval:
  quick_eval_examples: 32
  full_eval_every_cycles: 10
  rollback_tolerance: 0.005
  moving_avg_window: 3
  soft_accept_temperature: 0.0
  eval_batch_size: 1

logging:
  backend: mlflow
  log_every_cycles: 1
  save_every_cycles: 25
  run_dir: runs/${experiment.name}
  mlflow:
    enabled: false
    tracking_uri: ""
    experiment_name: ""
