experiment:
  name: tg_lora_9b_accel_aggressive
  seed: 42

model:
  name_or_path: Qwen/Qwen3.5-9B
  dtype: bfloat16
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: all-linear

data:
  train_path: data/train.jsonl
  valid_quick_path: data/valid_quick.jsonl
  valid_full_path: data/valid_full.jsonl
  gold_test_path: data/gold_test.jsonl
  max_seq_len: 1024

training:
  batch_size: 1
  grad_accumulation: 8
  learning_rate: 2.0e-4
  weight_decay: 0.0
  max_cycles: 500
  gradient_checkpointing: true
  max_grad_norm: 1.0
  optimizer_lifecycle: recreate_per_cycle
  schedule_type: linear
  early_stopping_patience: null
  min_cycles_before_stop: 3
  min_steps_before_stop: 100

tg_lora:
  K_initial: 3
  K_candidates: [2, 3, 5, 8]

  N_initial: 5
  N_candidates: [1, 3, 5, 10, 20]

  alpha_initial: 0.3
  alpha_min: 0.03
  alpha_max: 1.5
  alpha_log_sigma: 0.15

  beta_initial: 0.8
  beta_candidates: [0.5, 0.8, 0.9, 0.95]

  lr_initial: 0.0005
  lr_min: 1.0e-5
  lr_max: 0.001
  lr_accept_boost: 1.05
  lr_reject_decay: 0.5

  k_explore_prob: 0.0
  n_explore_prob: 0.0
  beta_explore_prob: 0.0
  strategy_explore_prob: 0.0
  lr_explore_prob: 0.0
  lr_log_sigma: 0.1

  accel_instability_lr_decay: 0.9
  accel_convergence_lr_boost: 2.0

  relative_update_cap: 0.005

  active_layer_strategy: last_25_percent
  random_middle_layers: 2
  layer_sample_temperature: 1.0
  force_top_layers_only: true
  enable_random_walk: false
  enable_convergence_adaptation: true

  confident_skip_cos: 0.0
  confident_skip_min_cycles: 10

eval:
  quick_eval_examples: 32
  full_eval_every_cycles: 10
  rollback_tolerance: 0.005
  moving_avg_window: 3
  soft_accept_temperature: 0.0

logging:
  backend: mlflow
  log_every_cycles: 1
  save_every_cycles: 25
  run_dir: runs/${experiment.name}
  mlflow:
    enabled: true
    tracking_uri: ""
    experiment_name: ""
