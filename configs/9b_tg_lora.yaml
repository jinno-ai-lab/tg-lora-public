experiment:
  name: tg_lora_9b_mvp
  seed: 42

model:
  name_or_path: Qwen/Qwen3.5-9B
  dtype: bfloat16
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: all-linear

data:
  train_path: data/train.jsonl
  valid_quick_path: data/valid_quick.jsonl
  valid_full_path: data/valid_full.jsonl
  gold_test_path: data/gold_test.jsonl
  max_seq_len: 1024 # default for 12GB-class CUDA GPUs on this machine

training:
  batch_size: 1
  grad_accumulation: 8
  learning_rate: 2.0e-4
  weight_decay: 0.0
  max_cycles: 500
  gradient_checkpointing: true
  max_grad_norm: 1.0
  optimizer_lifecycle: recreate_per_cycle # experimental alternative: reuse_state_reset_experimental
  schedule_type: linear # TG-LoRA recreates optimizer per cycle; scheduler not used
  early_stopping_patience: null
  min_cycles_before_stop: 3
  min_steps_before_stop: 100

tg_lora:
  K_initial: 3
  K_candidates: [2, 3, 5, 8]

  N_initial: 5
  N_candidates: [1, 3, 5, 10, 20]

  alpha_initial: 0.3
  alpha_min: 0.03
  alpha_max: 1.5
  alpha_log_sigma: 0.15

  beta_initial: 0.8
  beta_candidates: [0.5, 0.8, 0.9, 0.95]

  lr_initial: 0.0005
  lr_min: 1.0e-5
  lr_max: 0.001
  lr_accept_boost: 1.05
  lr_reject_decay: 0.5

  # Exploration probabilities (propose)
  k_explore_prob: 0.0
  n_explore_prob: 0.0
  beta_explore_prob: 0.0
  strategy_explore_prob: 0.0
  lr_explore_prob: 0.0
  lr_log_sigma: 0.1

  # Acceleration-based adaptation (magnitude_acceleration → lr/K adjustment)
  # accel_instability_lr_decay: 0.7   # lr multiplier when velocity accelerates (instability)
  # accel_convergence_lr_boost: 1.1   # lr multiplier when velocity decelerates (convergence)

  relative_update_cap: 0.005

  active_layer_strategy: last_25_percent
  random_middle_layers: 2
  layer_sample_temperature: 1.0
  force_top_layers_only: true
  enable_random_walk: false

  # Confident-skip: auto-accept extrapolation without eval when velocity
  # is highly aligned with recent deltas. 0 = disabled (always eval).
  # Recommended: 0.92-0.96 after initial convergence.
  confident_skip_cos: 0.0
  confident_skip_min_cycles: 10

  # Cosine-driven N selection: choose the speculative horizon from the
  # short/long lr-normalized velocity EMA consistency before extrapolation.
  cosine_n_selection_enabled: true
  cosine_n_selection_short_window: 3
  cosine_n_selection_long_window: 10
  cosine_n_selection_thresholds:
    1: 0.0
    3: 0.70
    5: 0.75
    10: 0.80
    20: 0.90

  # Subspace zeroth-order steps: forward-only data-driven updates inside the
  # short/long velocity subspace. Disabled by default to preserve legacy runs.
  subspace_zo_enabled: false
  subspace_zo_tau_dim: 0.15
  subspace_zo_tau_cos: 0.70
  subspace_zo_mu_ratio: 0.001
  subspace_zo_eps_curv: 1.0e-8
  subspace_zo_eta_fallback_ratio: 0.01
  subspace_zo_max_step_ratio: 0.02
  subspace_zo_max_steps_per_cycle: 10
  subspace_zo_force_dim: 0
  subspace_zo_disable_curvature: false
  subspace_zo_stop_on_positive_g1: true
  subspace_zo_g1_stop_epsilon: 0.0

alpha_line:
  alpha_line_enabled: false
  alpha_line_order: 0
  b_logical: 32
  b_heavy: 4
  b_light: 16
  m_alpha_steps: 19
  alpha_init: 0.0
  alpha_lr: 0.01
  v_update_every: 1
  alpha_line_max_consecutive_reject: 3
  alpha_line_finite_diff_eps: 0.001
  future_work_metrics_enabled: false
  future_work_internal_metrics_enabled: false

eval:
  quick_eval_examples: 32
  full_eval_every_cycles: 10
  rollback_tolerance: 0.005
  moving_avg_window: 3
  soft_accept_temperature: 0.0

logging:
  backend: mlflow
  log_every_cycles: 1
  save_every_cycles: 25
  run_dir: runs/${experiment.name}
  mlflow:
    enabled: true
    tracking_uri: ""
    experiment_name: ""
