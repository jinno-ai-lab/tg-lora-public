experiment:
  name: qlora_9b_baseline_with_prefix_cache
  seed: 42


model:
  name_or_path: Qwen/Qwen3.5-9B
  dtype: bfloat16
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16

lora:
  r: 16
  alpha: 32
  dropout: 0.0
  target_modules: all-linear

data:
  train_path: data/train.jsonl
  valid_quick_path: data/valid_quick.jsonl
  valid_full_path: data/valid_full.jsonl
  gold_test_path: data/gold_test.jsonl
  max_seq_len: 2048

training:
  batch_size: 1
  grad_accumulation: 8
  learning_rate: 2.0e-4
  weight_decay: 0.0
  max_cycles: 100
  gradient_checkpointing: true
  max_grad_norm: 1.0
  optimizer_lifecycle: recreate_per_cycle
  trainable_lora_scope: last_25_percent
  save_trajectory_delta_artifacts: true
  trajectory_delta_artifact_interval: 1
  prefix_feature_cache_experimental: true
  prefix_feature_cache_train: true
  prefix_feature_cache_valid_quick: true
  prefix_feature_cache_valid_full: true
  prefix_feature_cache_num_workers: 4
  prefix_feature_cache_pin_memory: true
  prefix_feature_cache_persistent_workers: true
  prefix_feature_cache_prefetch_factor: 4
  prefix_feature_cache_dir: .cache/prefix_feature_cache_paper_poc
  prefix_feature_cache_force_rebuild: false
  prefix_feature_cache_mode: reuse
  prefix_feature_cache_share_across_seeds: true
  prefix_feature_cache_offload_prefix_to_cpu: true
  prefix_feature_cache_async: false
  prefix_feature_cache_async_device: null

tg_lora:
  K_initial: 2
  K_candidates: [2]
  N_initial: 1
  N_candidates: [1]
  alpha_initial: 0.001
  alpha_min: 0.001
  alpha_max: 0.002
  alpha_log_sigma: 0.01
  beta_initial: 0.9
  beta_candidates: [0.9]
  lr_initial: 2.0e-4
  lr_min: 1.9e-4
  lr_max: 2.1e-4
  lr_accept_boost: 1.01
  lr_reject_decay: 0.99
  k_explore_prob: 0.0
  n_explore_prob: 0.0
  beta_explore_prob: 0.0
  strategy_explore_prob: 0.0
  lr_explore_prob: 0.0
  lr_log_sigma: 0.01
  relative_update_cap: 0.5
  active_layer_strategy: last_25_percent
  random_middle_layers: 0
  layer_sample_temperature: 1.0
  force_top_layers_only: true
  enable_random_walk: false
  enable_convergence_adaptation: false
  confident_skip_cos: 0.0
  confident_skip_min_cycles: 10

eval:
  quick_eval_examples: 32
  full_eval_every_cycles: 10
  rollback_tolerance: 0.005
  moving_avg_window: 3
  soft_accept_temperature: 0.0

logging:
  backend: mlflow
  log_every_cycles: 1
  save_every_cycles: 25
  run_dir: runs/${experiment.name}
  mlflow:
    enabled: true
    tracking_uri: ""
    experiment_name: ""
